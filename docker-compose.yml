version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: himia_postgres
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_new_password
    ports:
      - "5433:5432"
    volumes:
      - himia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - himia_network

  server:
    build: ./server
    container_name: himia_server
    environment:
      PORT: 5000
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: my_new_password
      DB_NAME: products_db
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - himia_network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: himia_client
    ports:
      - "3001:80"
    depends_on:
      - server
    networks:
      - himia_network

volumes:
  himia_postgres_data:

networks:
  himia_network:
    driver: bridge
